<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Ears -->
  <polygon points="20,52 34,8 52,42" />
  <polygon points="108,52 94,8 76,42" />
  <!-- Head -->
  <ellipse cx="64" cy="72" rx="44" ry="38" />
  <!-- Eyes -->
  <ellipse cx="46" cy="64" rx="7" ry="8" fill="#fff" />
  <ellipse cx="82" cy="64" rx="7" ry="8" fill="#fff" />
  <ellipse cx="47" cy="65" rx="4" ry="5" fill="#4a7" />
  <ellipse cx="83" cy="65" rx="4" ry="5" fill="#4a7" />
  <circle cx="47" cy="64" r="2.5" fill="#111" />
  <circle cx="83" cy="64" r="2.5" fill="#111" />
  <!-- Nose -->
  <polygon points="64,78 60,83 68,83" fill="#e8a" />
  <!-- Mouth -->
  <path d="M60,83 Q64,90 64,88" fill="none" stroke-width="1.5" stroke-linecap="round" />
  <path d="M68,83 Q64,90 64,88" fill="none" stroke-width="1.5" stroke-linecap="round" />
  <!-- Whiskers -->
  <line x1="10" y1="72" x2="42" y2="78" stroke-width="1.5" stroke-linecap="round" />
  <line x1="8" y1="82" x2="41" y2="82" stroke-width="1.5" stroke-linecap="round" />
  <line x1="86" y1="78" x2="118" y2="72" stroke-width="1.5" stroke-linecap="round" />
  <line x1="87" y1="82" x2="120" y2="82" stroke-width="1.5" stroke-linecap="round" />
  <style>
    polygon, ellipse { fill: #555; }
    ellipse[fill="#fff"] { fill: #fff; }
    ellipse[fill="#4a7"] { fill: #4a7; }
    circle[fill="#111"] { fill: #111; }
    polygon[fill="#e8a"] { fill: #e8a; }
    line, path { stroke: #555; }
    @media (prefers-color-scheme: dark) {
      polygon, ellipse { fill: #bbb; }
      ellipse[fill="#fff"] { fill: #fff; }
      ellipse[fill="#4a7"] { fill: #4a7; }
      circle[fill="#111"] { fill: #111; }
      polygon[fill="#e8a"] { fill: #e8a; }
      line, path { stroke: #bbb; }
    }
  </style>
</svg>
